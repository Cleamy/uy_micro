syntax = "proto3";

package role.v1;

option go_package = "proto/role/v1;rolepb";

// 角色服务
service RoleService {
  // 根据ID查询角色
  rpc GetRoleByID(GetRoleByIDReq) returns (GetRoleByIDResp);
  // 批量查询角色
  rpc BatchGetRoles(BatchGetRolesReq) returns (BatchGetRolesResp);
}

message Role {
  uint64 id = 1;
  string name = 2;
  string code = 3;
  string remark = 4;
  int64 created_at = 5;
}

message GetRoleByIDReq {
  uint64 id = 1;
}

message GetRoleByIDResp {
  int32 code = 1;
  string msg = 2;
  Role data = 3;
}

message BatchGetRolesReq {
  repeated uint64 ids = 1;
}

message BatchGetRolesResp {
  int32 code = 1;
  string msg = 2;
  map<uint64, Role> data = 3;
}