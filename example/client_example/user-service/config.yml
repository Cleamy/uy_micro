app:
  name: user-service
  env: dev
  version: v1.0.0

logger:
  level: info
  format: console
  file_path: ./logs/user.log
  max_size: 100
  max_backups: 10

database:
  enable: true
  primary:
    driver: postgres
    host: 127.0.0.1
    port: 5432
    user: postgres
    password: 123456
    db_name: user_db
    charset: utf8
    max_idle: 10
    max_open: 100
    max_lifetime: 3600

redis:
  enable: false

web:
  enable: true
  port: 2201
  mode: debug
  context_path: /api/v1

grpc:
  enable: true
  port: 1201
  reflection: true

consul:
  enable: true
  address: "127.0.0.1:8500"
  tags: ["user", "dev"]
  check:
    interval: "10s"
    timeout: "5s"
    deregister: "30s"

sentinel:
  enable: false