app:
  name: api-gateway
  env: dev

logger:
  level: info
  format: console

# 网关需要服务发现，所以开启 consul
consul:
  enable: true
  address: 127.0.0.1:8500

# 核心：网关配置
gateway:
  enable: true
  port: 1059          # 网关统一入口端口
  context_path: /

  # 跨域配置
  cors:
    enable: true
    allow_origins: ["*"]
    allow_methods: ["GET","POST","PUT","DELETE","OPTIONS"]
    allow_headers: ["*"]
    allow_credentials: false
    max_age: 3600

  # 全局鉴权配置
  auth:
    enable: false
    type: jwt
    jwt_secret: uy_micro_2024_secret_key
    jwt_expire: 24
    # 免鉴权路径
    exclude_paths:
      - /api/v1/user/login
      - /health
      - /ping

  # IP 黑名单
  ip_blacklist: []

  # 路由规则：路径 → 后端服务
  routes:
    # 用户服务路由
    - id: user_route
      path: /api/v1/user
      service_name: user-service   # 从 Consul 发现 user-service
      strip_prefix: false
      auth_enable: true            # 该路由需要鉴权
      rate_limit: true             # 该路由开启限流

    # 角色服务路由
    - id: role_route
      path: /api/v1/role
      service_name: role-service   # 从 Consul 发现 role-service
      strip_prefix: false
      auth_enable: true
      rate_limit: false